<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Estudiantes</h1>
        <p style="font-size:14px;color:#6b7280;">👤 <span id="user-session"></span> <button id="logout-btn" style="margin-left:8px;padding:4px 10px;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:13px;">Cerrar sesión</button></p>
        
        <!-- Formulario para crear/editar estudiante -->
        <div class="card">
            <h2 id="form-title">Nuevo Estudiante</h2>
            <form id="student-form">
                <input type="hidden" id="student-id">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" required minlength="2">
                </div>
                <div class="form-group">
                    <label for="age">Edad:</label>
                    <input type="number" id="age" name="age" required min="1">
                </div>
                <div class="form-group">
                    <label for="grade">Nota (0-5):</label>
                    <input type="number" id="grade" name="grade" required min="0" max="5" step="0.1">
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn">Guardar</button>
                    <button type="button" id="cancel-btn" class="btn-cancel" style="display: none;">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- Lista de estudiantes -->
        <div class="card">
            <h2>Lista de Estudiantes</h2>
            <table id="students-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Nota</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="students-list">
                    <!-- Los estudiantes se cargarán aquí con AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
